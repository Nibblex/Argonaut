# Flatpak manifest for Argonaut.
#
# Before building, generate python3-requirements.json (pinned PyPI sources;
# Flathub builds have no network access):
#
#   python3 flatpak-pip-generator --requirements-file=requirements.txt \
#       --output python3-requirements
#
# flatpak-pip-generator lives in https://github.com/flatpak/flatpak-builder-tools
#
# Local test build:
#   flatpak-builder --user --install --force-clean build-dir io.github.nibblex.Argonaut.yml
app-id: io.github.nibblex.Argonaut
runtime: org.kde.Platform
runtime-version: '5.15-25.08'
sdk: org.kde.Sdk
# the PyQt BaseApp ships PyQt5, so it is not in requirements.txt
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '5.15-25.08'
command: argonaut

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # argospm downloads language models
  - --share=network
  # read documents and write translations; broader access can be granted
  # by the user with Flatseal if needed
  - --filesystem=xdg-documents:rw
  - --filesystem=xdg-download:rw

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - python3-requirements.json

  - name: argonaut
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-build-isolation .
      - install -Dm644 data/io.github.nibblex.Argonaut.desktop
        -t /app/share/applications
      - install -Dm644 data/io.github.nibblex.Argonaut.metainfo.xml
        -t /app/share/metainfo
      - install -Dm644 data/icons/io.github.nibblex.Argonaut.svg
        -t /app/share/icons/hicolor/scalable/apps
    sources:
      - type: dir
        path: .
